services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/data
    environment:
      - DB_PATH=/data/dashboard-builder.db
      - PORT=8080
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-qwen/qwen3-32b}

  frontend:
    build: ./frontend
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  backend-data:
